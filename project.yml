name: DisplayFit
options:
  bundleIdPrefix: com.baserize
  deploymentTarget:
    macOS: "26.0"
configs:
  Debug: debug
  Release: release
settings:
  base:
    CURRENT_PROJECT_VERSION: 20260513001
    MARKETING_VERSION: 2026.5.13
    MACOSX_DEPLOYMENT_TARGET: "26.0"
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: 27LDR382XX
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_LANGUAGE: en
    CLANG_ENABLE_MODULES: YES
    ENABLE_HARDENED_RUNTIME: YES
    ENABLE_USER_SCRIPT_SANDBOXING: NO
  configs:
    Debug:
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG DIRECT_DISTRIBUTION
    Release:
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: DIRECT_DISTRIBUTION
targets:
  DisplayFit:
    type: application
    platform: macOS
    sources:
      - path: Sources/Shared
      - path: Sources/App
      - path: Sources/Controls/BrightnessControlIntents.swift
      - path: Sources/Controls/DisplayFitAppShortcuts.swift
      - path: Sources/Controls/DisplayFitControls.swift
    dependencies:
      - target: DisplayFitControls
        embed: true
        codeSign: true
    settings:
      base:
        DEVELOPMENT_TEAM: 27LDR382XX
        CODE_SIGN_STYLE: Automatic
        PRODUCT_BUNDLE_IDENTIFIER: com.baserize.displayfit
        PRODUCT_NAME: DisplayFit
        INFOPLIST_FILE: Sources/App/Info.plist
        CODE_SIGN_ENTITLEMENTS: Sources/App/DisplayFitDirect.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: NO
    info:
      path: Sources/App/Info.plist
      properties:
        CFBundleDisplayName: DisplayFit
        CFBundleIconName: AppIcon
        CFBundleIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER)
        CFBundleName: DisplayFit
        CFBundlePackageType: APPL
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSApplicationCategoryType: public.app-category.utilities
        LSMinimumSystemVersion: $(MACOSX_DEPLOYMENT_TARGET)
        NSHumanReadableCopyright: Copyright © 2026 Sunghyun Kim.
        NSPrincipalClass: NSApplication
  DisplayFitControls:
    type: app-extension
    platform: macOS
    sources:
      - path: Sources/Shared
      - path: Sources/Controls
    settings:
      base:
        DEVELOPMENT_TEAM: 27LDR382XX
        CODE_SIGN_STYLE: Automatic
        PRODUCT_BUNDLE_IDENTIFIER: com.baserize.displayfit.controls
        PRODUCT_NAME: DisplayFitControls
        INFOPLIST_FILE: Sources/Controls/Info.plist
        CODE_SIGN_ENTITLEMENTS: Sources/Controls/DisplayFitControls.entitlements
        ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: NO
    info:
      path: Sources/Controls/Info.plist
      properties:
        CFBundleDisplayName: DisplayFit Controls
        CFBundleIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER)
        CFBundleName: DisplayFitControls
        CFBundlePackageType: XPC!
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSMinimumSystemVersion: $(MACOSX_DEPLOYMENT_TARGET)
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
